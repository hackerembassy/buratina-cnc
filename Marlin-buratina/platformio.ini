; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeeduino]
platform = atmelavr
board = seeeduino_mega
framework = arduino

upload_protocol = stk500v2
upload_speed = 115200

monitor_speed = 115200

# Flashing bootloader
# ```
# ~/.platformio/packages/tool-avrdude/bin/avrdude -p m2560 -c avrisp -C ~/.platformio/packages/tool-avrdude/avrdude.conf -P /dev/tty.usbserial-1330 -b 19200 -U flash:w:Mega2560-prod-firmware-2011-06-29.hex -U hfuse:w:0xD8:m -U lfuse:w:0xFF:m -U efuse:w:0xFD:m
# -U hfuse:w:0xD8:m -U lfuse:w:0xFF:m -U efuse:w:0xFD:m
# ```
; upload_protocol = custom
; upload_port = /dev/tty.usbserial-1330
; upload_speed = 19200
; upload_flags =
;     -C
;     ; use "tool-avrdude-megaavr" for the atmelmegaavr platform
;     ${platformio.packages_dir}/tool-avrdude/avrdude.conf
;     -p
;     $BOARD_MCU
;     -P
;     $UPLOAD_PORT
;     -b
;     $UPLOAD_SPEED
;     -c
;     stk500v1
; upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i

lib_deps = arduino-libraries/LiquidCrystal@^1.0.7
