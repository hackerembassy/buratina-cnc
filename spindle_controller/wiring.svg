<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Buratina CNC Spindle Tachometer - Wiring Diagram</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#666">ESP32-C3 0.42" OLED Module + Optical Sensor</text>

  <!-- ==================== ESP32-C3 MODULE ==================== -->
  <rect x="250" y="80" width="300" height="340" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <rect x="255" y="85" width="290" height="330" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>

  <!-- Module label -->
  <text x="400" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#e0e0e0">ESP32-C3 OLED 0.42"</text>
  <text x="400" y="126" text-anchor="middle" font-size="10" fill="#888">RISC-V 160MHz / 4MB Flash</text>

  <!-- Built-in OLED display -->
  <rect x="330" y="138" width="140" height="55" rx="4" fill="#000" stroke="#444" stroke-width="1.5"/>
  <rect x="335" y="142" width="130" height="47" rx="2" fill="#001a00" stroke="#0a3a0a"/>
  <text x="400" y="162" text-anchor="middle" font-size="10" fill="#00ff88">72x40 SSD1306</text>
  <text x="400" y="177" text-anchor="middle" font-size="16" font-weight="bold" fill="#00ff88">1234 RPM</text>
  <text x="400" y="140" text-anchor="middle" font-size="7" fill="#666">built-in I2C: SDA=GPIO8 SCL=GPIO9</text>

  <!-- USB connector -->
  <rect x="370" y="395" width="60" height="30" rx="3" fill="#555" stroke="#777" stroke-width="1.5"/>
  <rect x="380" y="405" width="40" height="15" rx="2" fill="#333" stroke="#666"/>
  <text x="400" y="414" text-anchor="middle" font-size="8" fill="#ccc">USB</text>
  <text x="400" y="440" text-anchor="middle" font-size="9" fill="#888">Micro-USB (CP2102)</text>

  <!-- ===== LEFT SIDE PINS ===== -->
  <!-- Pin rows on left -->
  <g fill="#e0e0e0" font-size="11">
    <!-- 3V3 -->
    <rect x="250" y="210" width="55" height="20" rx="2" fill="#cc3333" stroke="#992222"/>
    <text x="278" y="224" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">3V3</text>
    <line x1="250" y1="220" x2="200" y2="220" stroke="#cc3333" stroke-width="2.5"/>
    <circle cx="197" cy="220" r="4" fill="#cc3333"/>

    <!-- GND -->
    <rect x="250" y="240" width="55" height="20" rx="2" fill="#222" stroke="#555"/>
    <text x="278" y="254" text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">GND</text>
    <line x1="250" y1="250" x2="200" y2="250" stroke="#222" stroke-width="2.5"/>
    <circle cx="197" cy="250" r="4" fill="#333" stroke="#666"/>

    <!-- IO0 -->
    <rect x="250" y="270" width="55" height="20" rx="2" fill="#2a5298" stroke="#1a3a6a"/>
    <text x="278" y="284" text-anchor="middle" fill="#aaddff" font-size="10">IO0</text>
    <line x1="250" y1="280" x2="200" y2="280" stroke="#2a5298" stroke-width="2"/>
    <circle cx="197" cy="280" r="4" fill="#2a5298"/>

    <!-- IO1 -->
    <rect x="250" y="300" width="55" height="20" rx="2" fill="#2a5298" stroke="#1a3a6a"/>
    <text x="278" y="314" text-anchor="middle" fill="#aaddff" font-size="10">IO1</text>
    <line x1="250" y1="310" x2="200" y2="310" stroke="#2a5298" stroke-width="2"/>
    <circle cx="197" cy="310" r="4" fill="#2a5298"/>

    <!-- IO3 -->
    <rect x="250" y="330" width="55" height="20" rx="2" fill="#2a7a28" stroke="#1a5a1a"/>
    <text x="278" y="344" text-anchor="middle" fill="#aaffaa" font-size="10" font-weight="bold">IO3</text>
    <line x1="250" y1="340" x2="200" y2="340" stroke="#2a7a28" stroke-width="2.5"/>
    <circle cx="197" cy="340" r="4" fill="#2a7a28"/>

    <!-- IO10 -->
    <rect x="250" y="360" width="55" height="20" rx="2" fill="#2a5298" stroke="#1a3a6a"/>
    <text x="278" y="374" text-anchor="middle" fill="#aaddff" font-size="10">IO10</text>
    <line x1="250" y1="370" x2="200" y2="370" stroke="#2a5298" stroke-width="2"/>
    <circle cx="197" cy="370" r="4" fill="#2a5298"/>
  </g>

  <!-- ===== RIGHT SIDE PINS ===== -->
  <g fill="#e0e0e0" font-size="11">
    <!-- GND -->
    <rect x="495" y="210" width="55" height="20" rx="2" fill="#222" stroke="#555"/>
    <text x="523" y="224" text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">GND</text>
    <line x1="550" y1="220" x2="600" y2="220" stroke="#222" stroke-width="2.5"/>
    <circle cx="603" cy="220" r="4" fill="#333" stroke="#666"/>

    <!-- 5V -->
    <rect x="495" y="240" width="55" height="20" rx="2" fill="#cc3333" stroke="#992222"/>
    <text x="523" y="254" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">5V</text>
    <line x1="550" y1="250" x2="600" y2="250" stroke="#cc3333" stroke-width="2.5"/>
    <circle cx="603" cy="250" r="4" fill="#cc3333"/>

    <!-- IO2 -->
    <rect x="495" y="270" width="55" height="20" rx="2" fill="#555" stroke="#444"/>
    <text x="523" y="284" text-anchor="middle" fill="#999" font-size="10">IO2</text>
    <line x1="550" y1="280" x2="600" y2="280" stroke="#555" stroke-width="2"/>
    <circle cx="603" cy="280" r="4" fill="#555"/>

    <!-- IO4 -->
    <rect x="495" y="300" width="55" height="20" rx="2" fill="#555" stroke="#444"/>
    <text x="523" y="314" text-anchor="middle" fill="#999" font-size="10">IO4</text>
    <line x1="550" y1="310" x2="600" y2="310" stroke="#555" stroke-width="2"/>
    <circle cx="603" cy="310" r="4" fill="#555"/>

    <!-- IO5 -->
    <rect x="495" y="330" width="55" height="20" rx="2" fill="#555" stroke="#444"/>
    <text x="523" y="344" text-anchor="middle" fill="#999" font-size="10">IO5</text>
    <line x1="550" y1="340" x2="600" y2="340" stroke="#555" stroke-width="2"/>
    <circle cx="603" cy="340" r="4" fill="#555"/>

    <!-- IO6 -->
    <rect x="495" y="360" width="55" height="20" rx="2" fill="#555" stroke="#444"/>
    <text x="523" y="374" text-anchor="middle" fill="#999" font-size="10">IO6</text>
    <line x1="550" y1="370" x2="600" y2="370" stroke="#555" stroke-width="2"/>
    <circle cx="603" cy="370" r="4" fill="#555"/>
  </g>

  <!-- ==================== OPTICAL SENSOR ==================== -->
  <rect x="20" y="265" width="150" height="150" rx="10" fill="#2d1b4e" stroke="#6a3d9a" stroke-width="2"/>
  <text x="95" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#d4a5ff">Optical Sensor</text>
  <text x="95" y="306" text-anchor="middle" font-size="9" fill="#b088d0">(reflective/slotted)</text>

  <!-- Sensor icon -->
  <circle cx="95" cy="340" r="18" fill="none" stroke="#ff6644" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="82" y1="340" x2="70" y2="328" stroke="#ff6644" stroke-width="1.5"/>
  <line x1="82" y1="340" x2="70" y2="352" stroke="#ff6644" stroke-width="1.5"/>
  <rect x="98" y="332" width="14" height="16" rx="2" fill="#444" stroke="#666"/>
  <text x="105" y="343" text-anchor="middle" font-size="7" fill="#ccc">RX</text>

  <!-- Sensor pins -->
  <text x="40" y="382" font-size="10" fill="#cc3333" font-weight="bold">VCC</text>
  <text x="80" y="382" font-size="10" fill="#aaffaa" font-weight="bold">OUT</text>
  <text x="118" y="382" font-size="10" fill="#aaa" font-weight="bold">GND</text>

  <!-- Small pin circles on sensor -->
  <circle cx="50" cy="390" r="3" fill="#cc3333"/>
  <circle cx="90" cy="390" r="3" fill="#2a7a28"/>
  <circle cx="128" cy="390" r="3" fill="#555"/>

  <!-- ==================== WIRING ==================== -->

  <!-- Sensor VCC -> 3V3 -->
  <path d="M 50 393 L 50 470 L 185 470 L 185 220 L 197 220"
        fill="none" stroke="#cc3333" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="120" y="466" font-size="9" fill="#cc3333" font-weight="bold">3.3V power</text>

  <!-- Sensor OUT -> IO3 (green) -->
  <path d="M 90 393 L 90 450 L 175 450 L 175 340 L 197 340"
        fill="none" stroke="#2a7a28" stroke-width="2.5"/>
  <text x="120" y="446" font-size="9" fill="#aaffaa" font-weight="bold">signal (1 pulse/rev)</text>

  <!-- Sensor GND -> GND -->
  <path d="M 128 393 L 128 485 L 192 485 L 192 250 L 197 250"
        fill="none" stroke="#666" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="140" y="481" font-size="9" fill="#999">ground</text>

  <!-- ==================== CONNECTION TABLE ==================== -->
  <rect x="555" y="80" width="230" height="130" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <text x="670" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Connections</text>
  <line x1="565" y1="107" x2="775" y2="107" stroke="#ddd"/>

  <text x="570" y="123" font-size="10" fill="#333" font-weight="bold">Sensor</text>
  <text x="650" y="123" font-size="10" fill="#333" font-weight="bold">ESP32-C3</text>
  <text x="735" y="123" font-size="10" fill="#333" font-weight="bold">Wire</text>
  <line x1="565" y1="128" x2="775" y2="128" stroke="#eee"/>

  <text x="570" y="143" font-size="10" fill="#cc3333">VCC</text>
  <text x="650" y="143" font-size="10" fill="#cc3333">3V3</text>
  <text x="735" y="143" font-size="10" fill="#cc3333">red</text>

  <text x="570" y="160" font-size="10" fill="#2a7a28">OUT</text>
  <text x="650" y="160" font-size="10" fill="#2a7a28">IO3</text>
  <text x="735" y="160" font-size="10" fill="#2a7a28">green</text>

  <text x="570" y="177" font-size="10" fill="#666">GND</text>
  <text x="650" y="177" font-size="10" fill="#666">GND</text>
  <text x="735" y="177" font-size="10" fill="#666">black</text>

  <line x1="565" y1="185" x2="775" y2="185" stroke="#eee"/>
  <text x="570" y="200" font-size="9" fill="#888">OLED: built-in (GPIO8/9)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="555" y="440" width="230" height="65" rx="6" fill="#f8f8f8" stroke="#ccc"/>
  <text x="570" y="458" font-size="10" fill="#333" font-weight="bold">Pin legend:</text>
  <rect x="570" y="463" width="30" height="10" rx="2" fill="#2a7a28"/>
  <text x="608" y="472" font-size="9" fill="#555">sensor input (interrupt)</text>
  <rect x="570" y="478" width="30" height="10" rx="2" fill="#2a5298"/>
  <text x="608" y="487" font-size="9" fill="#555">safe GPIOs (available)</text>
  <rect x="570" y="493" width="30" height="10" rx="2" fill="#555"/>
  <text x="608" y="502" font-size="9" fill="#555">reserved (boot/JTAG/USB)</text>

  <!-- Spindle hint arrow -->
  <text x="95" y="430" text-anchor="middle" font-size="9" fill="#b088d0">mounts on spindle</text>
</svg>
